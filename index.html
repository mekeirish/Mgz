<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>LassoShop - Glassmorphism</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Cloudinary Widget -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-200 via-purple-200 to-pink-200 min-h-screen text-gray-800 font-sans antialiased overflow-x-hidden leading-relaxed">

  <!-- Conteneur principal : on cache l'app tant que non connecté -->
  <div id="app-wrapper" class="hidden">
    <!-- Header & Navigation -->
    <header class="glass-panel sticky top-0 z-50 p-5 mb-8 flex justify-between items-center rounded-b-3xl mx-3">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-bold tracking-tight">LassoShop</h1>
        <div id="user-info" class="flex items-center gap-2 ml-2">
          <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-white/30 hidden" />
          <span id="user-name" class="text-sm font-medium hidden"></span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button id="btn-logout" class="glass-btn px-4 py-2 text-sm font-medium hidden">Déconnexion</button>
        <label class="flex items-center cursor-pointer gap-3">
          <span class="text-base font-medium">Client</span>
          <div class="relative">
            <input type="checkbox" id="role-toggle" class="sr-only" />
            <div class="block glass-input w-14 h-8 rounded-full"></div>
            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform duration-300"></div>
          </div>
          <span class="text-base font-medium">Vendeur</span>
        </label>
        <button id="btn-cart" class="glass-btn px-5 py-3 rounded-xl font-medium text-base hidden">
          Panier (<span id="cart-count">0</span>)
        </button>
      </div>
    </header>

    <main id="app-container" class="max-w-lg mx-auto px-5 pb-24 flex flex-col gap-8"></main>

    <!-- Modale Panier -->
    <div id="cart-modal" class="fixed inset-0 z-50 hidden flex-col justify-end">
      <div class="absolute inset-0 bg-white/10 backdrop-blur-sm" id="close-cart"></div>
      <div class="glass-panel w-full h-[75vh] rounded-t-3xl p-6 relative flex flex-col gap-5 transform transition-transform translate-y-full" id="cart-content">
        <h2 class="text-2xl font-bold">Votre Panier</h2>
        <div id="cart-items" class="flex-1 overflow-y-auto flex flex-col gap-4"></div>
        <div class="glass-panel p-5 flex justify-between items-center mt-auto">
          <span class="font-medium text-lg">Total :</span>
          <span id="cart-total" class="font-bold text-xl">0.00 €</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Écran de connexion -->
  <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
    <div class="glass-panel p-10 rounded-3xl max-w-sm w-full">
      <h2 class="text-3xl font-bold mb-6">LassoShop</h2>
      <p class="text-lg opacity-80 mb-8">Connectez-vous avec Facebook pour accéder à l'application.</p>
      <button id="btn-login-facebook" class="glass-btn w-full py-4 text-lg font-medium flex items-center justify-center gap-3">
        <span class="text-2xl">👍</span> Se connecter avec Facebook
      </button>
    </div>
  </div>

  <!-- Scripts (Ordre crucial pour LAICHE) -->
  <script src="firebase.js"></script>
  <script src="business.js"></script>
  <script src="ui.js"></script>
  <script src="core.js"></script>
</body>
</html>
